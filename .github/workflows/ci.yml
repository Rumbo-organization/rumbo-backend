# CI de la API: formato (prettier --check), instala y typechequea (build = tsc).
# Sin lint ni tests configurados todavía; cuando existan (`pnpm lint` /
# `pnpm test`), agregar los pasos acá. El deploy y su status en el PR los maneja
# la integración de Vercel.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check
      - run: pnpm run build
